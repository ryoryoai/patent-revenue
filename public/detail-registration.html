<html lang="ja">
<head>

  <title>詳細登録 | PatentRevenue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #dee7f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #33478e;
      padding: 20px 24px;
      text-align: center;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
    }
    header p {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }
    main {
      flex: 1;
      max-width: 620px;
      margin: 32px auto;
      padding: 0 16px;
      width: 100%;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid rgba(51,71,142,0.15);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 28px 24px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      color: #33478e;
      margin-bottom: 16px;
    }
    .card h3 {
      font-size: 15px;
      font-weight: 700;
      color: #33478e;
      margin-bottom: 12px;
    }
    .prefill-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .prefill-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .prefill-label {
      font-size: 11px;
      font-weight: 500;
      color: #6b7a99;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .prefill-value {
      font-size: 14px;
      color: #333;
      font-weight: 500;
      word-break: break-all;
    }
    .purpose-group {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
    }
    .purpose-radio {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border: 2px solid #ccd3e0;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
      transition: border-color 0.15s, background 0.15s;
    }
    .purpose-radio input[type="radio"] {
      accent-color: #33478e;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .purpose-radio:has(input:checked) {
      border-color: #33478e;
      background: #f0f3fb;
    }
    .purpose-radio span {
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }
    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    label.field-label .required {
      color: #c62828;
      margin-left: 2px;
    }
    input[type="email"],
    input[type="text"],
    input[type="tel"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccd3e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
      background: #fff;
      transition: border-color 0.2s;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #33478e;
      box-shadow: 0 0 0 3px rgba(51,71,142,0.1);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .field-row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .radio-group {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      font-weight: 400;
      margin: 0;
    }
    .radio-group input[type="radio"] {
      accent-color: #33478e;
      width: 15px;
      height: 15px;
    }
    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 20px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      line-height: 1.6;
    }
    .checkbox-label input[type="checkbox"] {
      accent-color: #33478e;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .checkbox-label a {
      color: #33478e;
      text-decoration: underline;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: #33478e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }
    .btn:hover { background: #283a7a; }
    .btn:disabled { background: #9aa3c0; cursor: not-allowed; }
    .status {
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #fce4ec; color: #c62828; }
    .status.loading { display: block; background: #e3f2fd; color: #1565c0; }
    .hidden { display: none !important; }
    .divider {
      border: none;
      border-top: 1px solid rgba(51,71,142,0.1);
      margin: 20px 0;
    }
    footer {
      background: #1f266b;
      padding: 24px 16px;
      text-align: center;
    }
    footer p { font-size: 11px; color: rgba(255,255,255,0.5); }
    footer a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 12px; }
    @media (max-width: 600px) {
      .prefill-grid,
      .field-row-2col { grid-template-columns: 1fr; }
      .purpose-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KZN34H52"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <header>
    <h1>PatentRevenue</h1>
    <p>特許を収益に変える</p>
  </header>

  <main>
    <div id="loading-card" class="card">
      <p style="text-align:center;color:#6b7a99;font-size:14px;">情報を読み込んでいます...</p>
    </div>

    <div id="error-card" class="card hidden">
      <h2>リンクが無効です</h2>
      <p style="font-size:14px;color:#555;line-height:1.8;margin-top:8px;">このURLは無効か、有効期限が切れています。<br />診断メールから再度アクセスしてください。</p>
    </div>

    <div id="main-content" class="hidden">
      <!-- カード1: プリフィル情報 -->
      <div class="card">
        <h2>診断情報の確認</h2>
        <div class="prefill-grid">
          <div class="prefill-item">
            <span class="prefill-label">氏名</span>
            <span class="prefill-value" id="pre-name">—</span>
          </div>
          <div class="prefill-item">
            <span class="prefill-label">企業名</span>
            <span class="prefill-value" id="pre-company">—</span>
          </div>
          <div class="prefill-item">
            <span class="prefill-label">メールアドレス</span>
            <span class="prefill-value" id="pre-email">—</span>
          </div>
          <div class="prefill-item">
            <span class="prefill-label">特許番号</span>
            <span class="prefill-value" id="pre-patent-number">—</span>
          </div>
          <div class="prefill-item" style="grid-column: 1 / -1;">
            <span class="prefill-label">特許タイトル</span>
            <span class="prefill-value" id="pre-title">—</span>
          </div>
          <div class="prefill-item">
            <span class="prefill-label">カテゴリ</span>
            <span class="prefill-value" id="pre-category">—</span>
          </div>
          <div class="prefill-item">
            <span class="prefill-label">概要</span>
            <span class="prefill-value" id="pre-summary">—</span>
          </div>
        </div>
      </div>

      <!-- 目的選択 -->
      <div class="card">
        <h3>ご要望の種別を選択してください</h3>
        <div class="purpose-group">
          <label class="purpose-radio">
            <input type="radio" name="purpose" value="sale_license" id="purpose-sale" checked />
            <span>売却 / ライセンス登録</span>
          </label>
          <label class="purpose-radio">
            <input type="radio" name="purpose" value="consulting" id="purpose-consult" />
            <span>コンサルティング相談</span>
          </label>
        </div>
      </div>

      <!-- カード2: 売却/ライセンス登録フォーム -->
      <div id="form-sale-license" class="card">
        <h3>売却 / ライセンス登録 — 詳細情報</h3>

        <div class="field-row-2col">
          <div>
            <label class="field-label" for="sl-dept">担当部署</label>
            <input type="text" id="sl-dept" placeholder="知財部・技術部など" />
          </div>
          <div>
            <label class="field-label" for="sl-person">担当者名</label>
            <input type="text" id="sl-person" placeholder="山田 太郎" />
          </div>
        </div>

        <label class="field-label" for="sl-phone">電話番号</label>
        <input type="tel" id="sl-phone" placeholder="03-1234-5678" />

        <div class="field-row-2col">
          <div>
            <label class="field-label" for="sl-cat-major">技術カテゴリ（大分類）</label>
            <select id="sl-cat-major">
              <option value="">選択してください</option>
              <option value="機械・製造">機械・製造</option>
              <option value="電気・電子">電気・電子</option>
              <option value="化学・材料">化学・材料</option>
              <option value="情報・ソフトウェア">情報・ソフトウェア</option>
              <option value="医療・バイオ">医療・バイオ</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="sl-cat-minor">技術カテゴリ（小分類）</label>
            <input type="text" id="sl-cat-minor" placeholder="例: 画像認識・AI・熱交換" />
          </div>
        </div>

        <label class="field-label" for="sl-price">希望金額（万円）</label>
        <input type="number" id="sl-price" placeholder="例: 500" min="0" />

        <label class="field-label" for="sl-overview">特許の概要・アピールポイント</label>
        <textarea id="sl-overview" placeholder="この特許の技術的な強みや活用可能な領域を記載してください。"></textarea>

        <label class="field-label">支援内容の希望</label>
        <div class="radio-group">
          <label><input type="radio" name="sl-support" value="sale" checked /> 売却</label>
          <label><input type="radio" name="sl-support" value="license" /> ライセンス</label>
          <label><input type="radio" name="sl-support" value="both" /> どちらでも可</label>
        </div>

        <label class="field-label">技術サポートの提供可否</label>
        <div class="radio-group">
          <label><input type="radio" name="sl-tech-support" value="yes" checked /> 可能</label>
          <label><input type="radio" name="sl-tech-support" value="no" /> 不可</label>
          <label><input type="radio" name="sl-tech-support" value="negotiable" /> 要相談</label>
        </div>

        <label class="field-label">侵害実績の有無</label>
        <div class="radio-group">
          <label><input type="radio" name="sl-infringement" value="none" checked /> なし</label>
          <label><input type="radio" name="sl-infringement" value="suspected" /> 疑いあり</label>
          <label><input type="radio" name="sl-infringement" value="confirmed" /> 確認済み</label>
        </div>

        <label class="field-label">事業ごと売却の希望</label>
        <div class="radio-group">
          <label><input type="radio" name="sl-biz-sale" value="no" checked /> 特許のみ</label>
          <label><input type="radio" name="sl-biz-sale" value="yes" /> 事業ごと売却希望</label>
          <label><input type="radio" name="sl-biz-sale" value="negotiable" /> 要相談</label>
        </div>
      </div>

      <!-- カード3: コンサルティング相談フォーム -->
      <div id="form-consulting" class="card hidden">
        <h3>コンサルティング相談 — 詳細情報</h3>

        <label class="field-label" for="cs-phone">電話番号</label>
        <input type="tel" id="cs-phone" placeholder="03-1234-5678" />

        <label class="field-label" for="cs-type">相談種別</label>
        <select id="cs-type">
          <option value="">選択してください</option>
          <option value="valuation">特許価値の評価</option>
          <option value="portfolio">ポートフォリオ整理</option>
          <option value="strategy">収益化戦略策定</option>
          <option value="litigation">権利行使・侵害対応</option>
          <option value="other">その他</option>
        </select>

        <label class="field-label" for="cs-content">相談内容・背景</label>
        <textarea id="cs-content" style="min-height:120px;" placeholder="現在の状況や相談したい内容を具体的にご記載ください。"></textarea>
      </div>

      <!-- プライバシーポリシー同意 + 送信 -->
      <div class="card">
        <label class="checkbox-label">
          <input type="checkbox" id="privacy-agree" />
          <span><a href="/privacy.html" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>に同意して詳細情報を送信します</span>
        </label>
        <button type="button" class="btn" id="submit-btn">詳細情報を送信する</button>
        <div id="status" class="status"></div>
      </div>
    </div>
  </main>

  <footer>
    <p><a href="https://patent-revenue.iprich.jp/">サービス概要</a> | <a href="/privacy.html">プライバシーポリシー</a></p>
    <p style="margin-top:8px;">&copy; 2026 IP Rich Co.,Ltd.</p>
  </footer>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get("t") || "";

    const loadingCard = document.getElementById("loading-card");
    const errorCard = document.getElementById("error-card");
    const mainContent = document.getElementById("main-content");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    // 目的選択の切替
    const purposeRadios = document.querySelectorAll('input[name="purpose"]');
    const formSaleLicense = document.getElementById("form-sale-license");
    const formConsulting = document.getElementById("form-consulting");

    purposeRadios.forEach((radio) => {
      radio.addEventListener("change", () => {
        const isSale = document.getElementById("purpose-sale").checked;
        formSaleLicense.classList.toggle("hidden", !isSale);
        formConsulting.classList.toggle("hidden", isSale);
      });
    });

    function showError(message) {
      loadingCard.classList.add("hidden");
      mainContent.classList.add("hidden");
      if (message) {
        errorCard.querySelector("p").textContent = message;
      }
      errorCard.classList.remove("hidden");
    }

    async function loadPrefillData() {
      if (!token) {
        showError("URLにトークンが含まれていません。診断メールのリンクからアクセスしてください。");
        return;
      }

      try {
        const res = await fetch(`/api/detail-registration?t=${encodeURIComponent(token)}`);
        if (res.status === 401 || res.status === 404) {
          showError("このリンクは無効か、有効期限が切れています。診断メールから再度アクセスしてください。");
          return;
        }
        if (!res.ok) {
          showError("情報の読み込みに失敗しました。しばらくしてからお試しください。");
          return;
        }

        const data = await res.json();
        const lead = data.lead || {};

        document.getElementById("pre-name").textContent = lead.name || "—";
        document.getElementById("pre-company").textContent = lead.company_name || "—";
        document.getElementById("pre-email").textContent = lead.email || "—";
        document.getElementById("pre-patent-number").textContent = lead.patent_number || "—";
        document.getElementById("pre-title").textContent = lead.title || "—";
        document.getElementById("pre-category").textContent = lead.category || "—";
        document.getElementById("pre-summary").textContent = lead.summary || "—";

        loadingCard.classList.add("hidden");
        mainContent.classList.remove("hidden");
      } catch (err) {
        showError("通信エラーが発生しました。しばらくしてからお試しください。");
      }
    }

    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    submitBtn.addEventListener("click", async () => {
      const privacyAgree = document.getElementById("privacy-agree");
      if (!privacyAgree.checked) {
        statusEl.className = "status error";
        statusEl.style.display = "block";
        statusEl.textContent = "プライバシーポリシーへの同意が必要です。";
        return;
      }

      const purpose = getRadioValue("purpose");

      let fields;
      if (purpose === "sale_license") {
        fields = {
          department: document.getElementById("sl-dept").value.trim(),
          person_name: document.getElementById("sl-person").value.trim(),
          phone: document.getElementById("sl-phone").value.trim(),
          category_major: document.getElementById("sl-cat-major").value,
          category_minor: document.getElementById("sl-cat-minor").value.trim(),
          desired_price_man: document.getElementById("sl-price").value.trim(),
          overview: document.getElementById("sl-overview").value.trim(),
          support_type: getRadioValue("sl-support"),
          tech_support: getRadioValue("sl-tech-support"),
          infringement: getRadioValue("sl-infringement"),
          business_sale: getRadioValue("sl-biz-sale")
        };
      } else {
        fields = {
          phone: document.getElementById("cs-phone").value.trim(),
          consult_type: document.getElementById("cs-type").value,
          consult_content: document.getElementById("cs-content").value.trim()
        };
      }

      submitBtn.disabled = true;
      statusEl.className = "status loading";
      statusEl.style.display = "block";
      statusEl.textContent = "送信中...";

      try {
        const res = await fetch("/api/detail-registration", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, type: purpose, fields })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          statusEl.className = "status success";
          statusEl.textContent = "詳細情報を送信しました。担当者よりご連絡いたします。";
          submitBtn.disabled = true;
          submitBtn.textContent = "送信済み";
        } else {
          statusEl.className = "status error";
          statusEl.textContent = data.message || "送信に失敗しました。時間をおいて再度お試しください。";
          submitBtn.disabled = false;
        }
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = "通信エラーが発生しました。しばらくしてからお試しください。";
        submitBtn.disabled = false;
      }
    });

    loadPrefillData();
  </script>
</body>
</html>
